<!-- Fetches state from server
Updates UI (happy/sad/etc.) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Virtual Pet CLI</title>
    <link rel="icon" href="EDIT">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
</head>

<body>
    <div id="wrapper"> 
    <!-- TITLE -->
        <div id="title">Pixel</div>

    <div id="main">  
    <!-- PIXEL -->
        <div id="virtualPet">
            <img id="pixel-image" src="neutral.png">
        </div>
    
    <!-- BARS -->
    <div id="bar-container">
        <div id="stats-title"># stats</div>

        <div class="bar">
            <span>Happiness</span>
            <div class="bar-outer">
                <div class="bar-fill" id="happiness-fill"></div>
            </div>
        </div>

        <div class="bar">
            <span>Hunger</span>
            <div class="bar-outer">
                <div class="bar-fill" id="hunger-fill"></div>
            </div>
        </div>

        <div class="bar">
            <span>Energy</span>
            <div class="bar-outer">
                <div class="bar-fill" id="energy-fill"></div>
            </div>
        </div>

        <div class="bar">
            <span>Health</span>
            <div class="bar-outer">
                <div class="bar-fill" id="health-fill"></div>
            </div>
        </div>

          <div class="bar">
            <!-- hardcoded swag bar -->
            <span>Swag</span>
            <div class="bar-outer">
                <div class="bar-fill" style="width: 100%"></div>
            </div>
        </div>

    </div>
    </div>          
    </div>
</body>
<script src="app.js"></script>
</html>
